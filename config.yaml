metadata:
  driver: "postgres"
  postgres_url_env: "TGNAS_POSTGRES_URL"
buckets:
  06dce6d83b0be79c62e1:
    chat_id: "${TGNAS_TELEGRAM_CHAT_ID}"
webdav:
  prefix: "/dav/"
